
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Teacher Registration | ILAW AI</title>

    <link
        rel="stylesheet"
        href="../css/style.css">

</head>

<body>

    <div class="container">

        <div class="form-card">

            <h1>ILAW AI</h1>

            <h2>Teacher Registration</h2>

            <form id="registerForm">

                <input
                    type="text"
                    id="fullname"
                    placeholder="Full Name"
                    autocomplete="name"
                    required>

                <select
                    id="position"
                    required>

                    <option value="">
                        Select Position
                    </option>

                    <option value="Teacher I">
                        Teacher I
                    </option>

                    <option value="Teacher II">
                        Teacher II
                    </option>

                    <option value="Teacher III">
                        Teacher III
                    </option>

                    <option value="Teacher IV">
                        Teacher IV
                    </option>

                    <option value="Teacher V">
                        Teacher V
                    </option>

                    <option value="Teacher VI">
                        Teacher VI
                    </option>

                    <option value="Master Teacher I">
                        Master Teacher I
                    </option>

                    <option value="Master Teacher II">
                        Master Teacher II
                    </option>

                    <option value="Master Teacher III">
                        Master Teacher III
                    </option>

                    <option value="Master Teacher IV">
                        Master Teacher IV
                    </option>

                </select>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    autocomplete="new-password"
                    required>

                <button
                    type="submit"
                    id="registerBtn">

                    Register

                </button>

            </form>

            <p class="message">

                Already have an account?

                <a href="login.html">

                    Login Here

                </a>

            </p>

        </div>

    </div>

    <script src="../js/auth.js"></script>

</body>

</html>
