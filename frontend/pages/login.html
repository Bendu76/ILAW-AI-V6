

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Teacher Login | ILAW AI</title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css">

</head>

<body>

    <div class="container">

        <div class="form-card">

            <h1>ILAW AI</h1>

            <h2>Teacher Login</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    autocomplete="current-password"
                    required>

                <button
                    type="submit"
                    id="loginBtn">

                    Login

                </button>

            </form>

            <p class="message">

                Don't have an account?

                <a href="register.html">

                    Register Here

                </a>

            </p>

        </div>

    </div>

    <script src="../js/auth.js"></script>

</body>

</html>
